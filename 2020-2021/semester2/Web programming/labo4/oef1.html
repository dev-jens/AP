<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=100, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        class Summer {
            add(getal) {
                let number =5;
                number += getal
                return number;
            }
            getCurrentSum(add) {
                document.write(add)
            }
        }

        const s1 = new Summer();
        s1.add(10);
        let result =s1.add(20);
        // prints 30
        console.log(s1.getCurrentSum(result));

        const s2 = new Summer();
        s2.add(30);
        result = s2.add(5);
    
        // prints 35
        console.log(s2.getCurrentSum(result));
    </script>
</body>

</html>
